<main>
  <div class="input-wrapper">
    @if (type() === "checkbox") {
      @if (checked()) {
        <button (click)="checked.set(false)"  class="icon icon__checkbox">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 0H3C1.346 0 0 1.346 0 3V17C0 18.654 1.346 20 3 20H17C18.654 20 20 18.654 20 17V3C20 1.346 18.654 0 17 0Z" fill="#4CAF50"/>
            <path d="M8.75008 13.5C8.61875 13.5001 8.48868 13.4743 8.36735 13.424C8.24602 13.3737 8.13582 13.3 8.04308 13.207L5.54308 10.707C5.44757 10.6147 5.37139 10.5044 5.31898 10.3824C5.26657 10.2604 5.23898 10.1291 5.23783 9.99636C5.23668 9.86358 5.26198 9.7319 5.31226 9.60901C5.36254 9.48611 5.43679 9.37446 5.53069 9.28056C5.62458 9.18667 5.73623 9.11242 5.85913 9.06214C5.98202 9.01186 6.1137 8.98655 6.24648 8.98771C6.37926 8.98886 6.51048 9.01645 6.63249 9.06886C6.75449 9.12127 6.86483 9.19745 6.95708 9.29296L8.75008 11.086L13.0431 6.79296C13.1353 6.69745 13.2457 6.62127 13.3677 6.56886C13.4897 6.51645 13.6209 6.48886 13.7537 6.48771C13.8865 6.48655 14.0181 6.51186 14.141 6.56214C14.2639 6.61242 14.3756 6.68667 14.4695 6.78056C14.5634 6.87446 14.6376 6.98611 14.6879 7.10901C14.7382 7.2319 14.7635 7.36358 14.7623 7.49636C14.7612 7.62914 14.7336 7.76036 14.6812 7.88236C14.6288 8.00437 14.5526 8.11471 14.4571 8.20696L9.45708 13.207C9.36434 13.3 9.25414 13.3737 9.13281 13.424C9.01149 13.4743 8.88142 13.5001 8.75008 13.5Z" fill="#E0E0E0"/>
          </svg>
        </button>
         
      } @else {
        <button (click)="checked.set(true)" class="icon icon__checkbox">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="19" height="19" rx="4.5" fill="white" stroke="#D9D9D9"/>
          </svg>
        </button>

      }
      
      <p>{{ label() }}</p>
    } @else {
      <section>
        <article style="display: flex;"> 
          <label style="margin-right: auto !important;">{{ label() }}</label> 
          @if (type()=== "password" && login()) {
            <span style="display: flex; font-size: 12px; font-weight: 500; align-items: center; color: #242442">Mot de passe oublié ?</span>
          }
        </article>
        
        <input 
          [type]="isPasswordVisible() ? 'text' : type()" 
          [placeholder]="placeholder()" 
          [(value)]="value"
          (input)="onInput($event)"
        />
        @if(!login() && type() === "password") {
          <article class="passwordValidation">
            <img src="/images/weaklevel.png" alt="" style="width: 100%;">
            <div>
              <span>Au moins 8 caractères</span>
              <span>1 majuscule, 1 minuscule, 1 chiffre</span>
            </div>
          </article>
        }
        
      </section>
      
       
      @if (value.length > 0) {
          <button type="button" class="icon icon__password" (click)="toggleVisibility()">
          @if (type() === 'password') {
            @if (isPasswordVisible()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            }
          } @else if (type() === 'email') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          } @else {
            <!-- 
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            -->
          }
        </button>
      }
      
    }
    
  </div>
</main>
